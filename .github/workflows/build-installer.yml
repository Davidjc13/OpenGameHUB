name: Build and Publish

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'alpha-*'
      - 'beta-*'
      - '[0-9]*.[0-9]*.[0-9]*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: windows-2022
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        shell: pwsh
        run: dotnet restore OpenGameHUB.sln

      - name: Build
        shell: pwsh
        run: dotnet build OpenGameHUB.sln -c Release --no-restore

  test:
    name: Test
    needs: build
    runs-on: windows-2022
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        shell: pwsh
        run: dotnet restore OpenGameHUB.sln

      - name: Build
        shell: pwsh
        run: dotnet build OpenGameHUB.sln -c Release --no-restore

      - name: Test
        shell: pwsh
        run: dotnet test OpenGameHUB.sln -c Release --no-build --verbosity normal

  publish:
    name: Publish
    needs: test
    if: github.ref_type == 'tag'
    runs-on: windows-2022
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $valid = $version -match '^(alpha-|beta-)' -or $version -match '^\d+\.\d+\.\d+$'
          if (-not $valid) {
            Write-Error "Tag '$version' does not match alpha-*, beta-*, or xx.yy.zz"
          }
          Write-Host "Publishing version: $version"
          "version=$version" >> $env:GITHUB_OUTPUT
          $prerelease = $version -match '^(alpha-|beta-)'
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT

      - name: Build installer
        shell: pwsh
        run: .\build-installer.ps1 -AppVersion "${{ steps.version.outputs.version }}" -SkipWingetInstall

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenGameHUB-Setup-${{ steps.version.outputs.version }}
          path: dist/OpenGameHUB-Setup-*.exe
          if-no-files-found: error

      - name: Attach installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/OpenGameHUB-Setup-*.exe
          fail_on_unmatched_files: true
          prerelease: ${{ steps.version.outputs.prerelease == 'True' }}
